<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @font-face { font-family: 'Manrope'; font-weight: 400; src: url('file:///C:/Users/Пользователь/клод/global/brand/fonts/Manrope-Regular.woff2') format('woff2'); }
  @font-face { font-family: 'Manrope'; font-weight: 700; src: url('file:///C:/Users/Пользователь/клод/global/brand/fonts/Manrope-Bold.woff2') format('woff2'); }
  @font-face { font-family: 'Manrope'; font-weight: 800; src: url('file:///C:/Users/Пользователь/клод/global/brand/fonts/Manrope-ExtraBold.woff2') format('woff2'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0A1C2E;
    font-family: 'Manrope', 'Tahoma', sans-serif;
  }

  .slide {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #0A1C2E;
    overflow: hidden;
  }

  /* Тонкая сетка на фоне */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(65,142,241,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(65,142,241,0.05) 1px, transparent 1px);
    background-size: 90px 90px;
  }

  /* Радиальное свечение по центру */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 48%,
      rgba(4,79,186,0.18) 0%,
      rgba(10,28,46,0) 70%);
  }

  /* ─── ШАПКА ─── */
  .header {
    position: absolute;
    top: 72px;
    left: 80px;
    right: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.90;
  }

  .label-right {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .header-line {
    position: absolute;
    top: 124px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: rgba(65,142,241,0.30);
  }

  /* ─── ЦЕНТРАЛЬНЫЙ БЛОК ─── */
  .center-block {
    position: absolute;
    top: 50%;
    left: 80px;
    right: 80px;
    transform: translateY(-58%);
    text-align: center;
  }

  .pre-label {
    font-size: 14px;
    font-weight: 400;
    color: rgba(65,142,241,0.80);
    letter-spacing: 0.20em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .title-line1 {
    font-size: 52px;
    font-weight: 800;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 8px;
  }

  .title-line2 {
    font-size: 96px;
    font-weight: 800;
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 48px;
  }

  .accent-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, #044FBA, #418EF1);
    margin: 0 auto 48px auto;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
    line-height: 1.65;
  }

  /* ─── НИЖНИЙ БЛОК 4 МЕТРИКИ ─── */
  .metrics-block {
    position: absolute;
    bottom: 100px;
    left: 80px;
    right: 80px;
  }

  .metrics-top-line {
    height: 1px;
    background: rgba(65,142,241,0.28);
    margin-bottom: 52px;
  }

  .metrics-row {
    display: flex;
    align-items: stretch;
  }

  .metric {
    flex: 1;
    text-align: center;
    padding: 0 8px;
    position: relative;
  }

  /* Тонкие вертикальные разделители */
  .metric + .metric::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10%;
    height: 80%;
    width: 1px;
    background: rgba(65,142,241,0.28);
  }

  .metric-val {
    font-size: 62px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 18px;
  }

  .metric-label {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .metrics-bottom-line {
    height: 1px;
    background: rgba(65,142,241,0.28);
    margin-top: 52px;
  }

  /* ─── НИЖНИЙ ФУТЕР ─── */
  .footer {
    position: absolute;
    bottom: 44px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: center;
  }

  .footer-text {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">

  <!-- Фон: сетка + свечение -->
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <!-- Декоративные circuit-трейсы по углам -->
  <svg style="position:absolute;inset:0;width:1080px;height:1920px;pointer-events:none" xmlns="http://www.w3.org/2000/svg">
    <!-- Углы -->
    <path d="M 0 150 L 60 150 L 80 130 L 80 0"   fill="none" stroke="rgba(65,142,241,0.20)" stroke-width="1"/>
    <path d="M 1080 150 L 1020 150 L 1000 130 L 1000 0" fill="none" stroke="rgba(65,142,241,0.20)" stroke-width="1"/>
    <path d="M 0 1770 L 60 1770 L 80 1790 L 80 1920"   fill="none" stroke="rgba(65,142,241,0.20)" stroke-width="1"/>
    <path d="M 1080 1770 L 1020 1770 L 1000 1790 L 1000 1920" fill="none" stroke="rgba(65,142,241,0.20)" stroke-width="1"/>
    <!-- Пады -->
    <circle cx="80"  cy="150"  r="4" fill="none" stroke="rgba(65,142,241,0.30)" stroke-width="1"/>
    <circle cx="1000" cy="150"  r="4" fill="none" stroke="rgba(65,142,241,0.30)" stroke-width="1"/>
    <circle cx="80"  cy="1770" r="4" fill="none" stroke="rgba(65,142,241,0.30)" stroke-width="1"/>
    <circle cx="1000" cy="1770" r="4" fill="none" stroke="rgba(65,142,241,0.30)" stroke-width="1"/>
    <!-- Горизонтальный акцент вверху -->
    <line x1="80" y1="150" x2="1000" y2="150" stroke="rgba(65,142,241,0.07)" stroke-width="1"/>
    <!-- Горизонтальный акцент внизу -->
    <line x1="80" y1="1770" x2="1000" y2="1770" stroke="rgba(65,142,241,0.07)" stroke-width="1"/>
  </svg>

  <!-- Шапка -->
  <div class="header">
    <div class="logo-text">Биопринтех</div>
    <div class="label-right">Образовательный материал</div>
  </div>
  <div class="header-line"></div>

  <!-- Центральный контент -->
  <div class="center-block">
    <div class="pre-label">Технология газонасыщения</div>
    <div class="title-line1">Что такое</div>
    <div class="title-line2">Газоперенос</div>
    <div class="accent-line"></div>
    <div class="subtitle">
      Процесс, который определяет рентабельность аквакультуры,<br>
      эффективность стоков и скорость восстановления водоёмов
    </div>
  </div>

  <!-- 4 метрики снизу -->
  <div class="metrics-block">
    <div class="metrics-top-line"></div>
    <div class="metrics-row">

      <div class="metric">
        <div class="metric-val">O₂</div>
        <div class="metric-label">Кислород<br>в воде</div>
      </div>

      <div class="metric">
        <div class="metric-val">kLa</div>
        <div class="metric-label">Коэффициент<br>переноса</div>
      </div>

      <div class="metric">
        <div class="metric-val">ΔC</div>
        <div class="metric-label">Движущая<br>сила</div>
      </div>

      <div class="metric">
        <div class="metric-val">×10</div>
        <div class="metric-label">Ускорение<br>Биопринтех</div>
      </div>

    </div>
    <div class="metrics-bottom-line"></div>
  </div>

  <!-- Футер -->
  <div class="footer">
    <div class="footer-text">limatech86.ru</div>
  </div>

</div>
</body>
</html>
