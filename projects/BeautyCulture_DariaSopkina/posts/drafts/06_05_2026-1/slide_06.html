<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #1a1714; }

  .slide { position: relative; width: 1080px; height: 1350px; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background-image: url('../../assets/images/post03-slide-06.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.35) saturate(0.6);
  }

  /* Extra dark overlay for CTA legibility */
  .overlay {
    position: absolute; inset: 0; z-index: 2;
    background: rgba(26,23,20,0.62);
  }

  .grain { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

  .brand {
    position: absolute; top: 52px; right: 60px; z-index: 10;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; color: rgba(245,240,234,0.5); letter-spacing: 0.1em;
  }
  .slide-num {
    position: absolute; bottom: 56px; right: 60px; z-index: 10;
    font-family: 'Raleway', sans-serif; font-size: 14px; font-weight: 400;
    color: rgba(245,240,234,0.4); letter-spacing: 0.15em;
  }

  /* Main layout — centered */
  .content {
    position: absolute;
    top: 140px;
    left: 72px;
    right: 72px;
    z-index: 10;
  }

  .overline {
    font-family: 'Raleway', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #8a6e52; margin-bottom: 28px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 88px;
    line-height: 0.92;
    color: #F5F0EA;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 48px;
  }

  .body-text {
    font-family: 'Raleway', sans-serif;
    font-size: 26px; font-weight: 300;
    line-height: 1.8; color: rgba(245,240,234,0.78);
    margin-bottom: 52px;
  }

  /* Divider before CTA */
  .divider {
    width: 100%;
    height: 1px;
    background: rgba(245,240,234,0.2);
    margin-bottom: 52px;
  }

  /* CTA block */
  .cta-block {
    position: absolute;
    bottom: 110px;
    left: 72px;
    right: 72px;
    z-index: 10;
  }

  .cta-label {
    font-family: 'Raleway', sans-serif;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #8a6e52; margin-bottom: 20px;
  }

  .cta-link {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-style: italic;
    font-size: 32px;
    color: rgba(245,240,234,0.9);
    letter-spacing: 0.01em;
    display: block;
    margin-bottom: 16px;
  }

  .cta-note {
    font-family: 'Raleway', sans-serif;
    font-size: 22px; font-weight: 300;
    color: rgba(245,240,234,0.55);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="bg"></div>
  <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="100%" height="100%" filter="url(#n)" opacity="0.05"/>
  </svg>
  <div class="overlay"></div>

  <div class="brand">Культура</div>
  <div class="slide-num">06 / 06</div>

  <div class="content">
    <div class="overline">Индивидуальный подход</div>
    <div class="headline">ПРОГРАММА<br>ПОДБИРАЕТСЯ<br>ПОД ВАС</div>
    <div class="body-text">
      Все цифры — ориентир, не приговор.<br>
      Тип кожи, цвет волос, гормональный фон,<br>
      история удаления — мастер учитывает<br>
      всё это и составляет план именно для вас 🤍
    </div>
    <div class="divider"></div>
  </div>

  <div class="cta-block">
    <div class="cta-label">Записаться</div>
    <span class="cta-link">b539491.yclients.com</span>
    <div class="cta-note">или через администратора 💌</div>
  </div>

</div>
</body>
</html>
