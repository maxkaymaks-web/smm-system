<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}

.slide {
  position: relative;
  width: 1080px;
  height: 1350px;
  background-color: #F5F0EA;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px;
}

.grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

.logo {
  position: absolute;
  top: 80px;
  right: 80px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 0.25em;
  color: #1a1714;
  opacity: 0.5;
  z-index: 20;
}

.slide-num {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  color: #1a1714;
  opacity: 0.5;
  letter-spacing: 0.15em;
  z-index: 20;
}

.content {
  max-width: 860px;
  z-index: 5;
}

.zone-label {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #8a6e52;
  opacity: 0.9;
  margin-bottom: 28px;
}

.headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.0;
  letter-spacing: 0.03em;
  color: #1a1714;
  text-transform: uppercase;
  margin-bottom: 36px;
}

.divider {
  width: 100%;
  height: 1px;
  background: #1a1714;
  opacity: 0.15;
  margin-bottom: 44px;
}

.body-text {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 20px;
  line-height: 1.75;
  color: #1a1714;
  opacity: 0.85;
}

.sessions-row {
  margin-top: 48px;
  display: flex;
  gap: 48px;
  align-items: flex-start;
}

.sessions-item {
  display: flex;
  flex-direction: column;
}

.sessions-number {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 60px;
  line-height: 1;
  color: #8a6e52;
  letter-spacing: -0.02em;
}

.sessions-sub {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 13px;
  color: #1a1714;
  opacity: 0.55;
  letter-spacing: 0.08em;
  margin-top: 6px;
  text-transform: uppercase;
}

.sessions-divider {
  width: 1px;
  height: 60px;
  background: #1a1714;
  opacity: 0.15;
  align-self: center;
}

.sessions-detail {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 15px;
  color: #1a1714;
  opacity: 0.5;
  margin-top: 8px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="slide">

  <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.04"/>
  </svg>

  <!-- Botanical -->
  <svg style="position:absolute;top:80px;right:80px;opacity:0.1;z-index:3;" width="100" height="190" viewBox="0 0 100 190" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 180 C50 138 28 110 8 68" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M50 148 C50 108 72 85 92 48" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M50 115 C40 92 22 80 4 60" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <path d="M50 85 C60 65 78 53 98 33" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="8" cy="66" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="92" cy="46" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <svg style="position:absolute;bottom:80px;left:80px;opacity:0.07;z-index:3;" width="80" height="130" viewBox="0 0 80 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M40 120 C40 88 22 68 6 40" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <path d="M40 90 C40 60 58 44 74 18" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <circle cx="6" cy="38" r="1.3" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="74" cy="16" r="1.3" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <div class="logo">Культура</div>
  <div class="slide-num">05 / 06</div>

  <div class="content">
    <div class="zone-label">Зона 04</div>
    <h1 class="headline">Ноги</h1>
    <div class="divider"></div>
    <p class="body-text">
      Большая площадь — но чаще всего хорошо предсказуемая зона.<br><br>
      Волоски на ногах обычно тёмные и структурированные, лазер работает стабильно.<br><br>
      Интервал: 5–7 недель, по мере замедления роста — увеличивается ✨
    </p>
    <div class="sessions-row">
      <div class="sessions-item">
        <div class="sessions-number">6–8</div>
        <div class="sessions-sub">Голени</div>
      </div>
      <div class="sessions-divider"></div>
      <div class="sessions-item">
        <div class="sessions-number">8–10</div>
        <div class="sessions-sub">Бёдра</div>
      </div>
      <div class="sessions-divider"></div>
      <div class="sessions-item" style="justify-content:center;padding-top:8px;">
        <div style="font-family:'Raleway',sans-serif;font-weight:300;font-size:14px;color:#1a1714;opacity:0.5;letter-spacing:0.06em;">сеансов</div>
        <div class="sessions-detail">интервал 5–7 нед.</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
