<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}

.slide {
  position: relative;
  width: 1080px;
  height: 1350px;
  background-color: #F5F0EA;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px;
}

/* Grain texture */
.grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* Logo */
.logo {
  position: absolute;
  top: 80px;
  right: 80px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 0.25em;
  color: #1a1714;
  opacity: 0.5;
  z-index: 20;
}

/* Slide number */
.slide-num {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  color: #1a1714;
  opacity: 0.5;
  letter-spacing: 0.15em;
  z-index: 20;
}

/* Content */
.content {
  text-align: center;
  max-width: 900px;
  z-index: 5;
}

/* Decorative top line */
.deco-line {
  width: 60px;
  height: 1px;
  background: #1a1714;
  opacity: 0.3;
  margin: 0 auto 60px;
}

.headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.0;
  letter-spacing: 0.04em;
  color: #1a1714;
  text-transform: uppercase;
  margin-bottom: 48px;
}

.subheadline {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 22px;
  line-height: 1.6;
  letter-spacing: 0.06em;
  color: #1a1714;
  opacity: 0.75;
}

/* Decorative bottom element */
.deco-bottom {
  margin-top: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0.25;
}
.deco-bottom span {
  width: 40px;
  height: 1px;
  background: #1a1714;
  display: block;
}
.deco-bottom svg { opacity: 0.6; }
</style>
</head>
<body>
<div class="slide">

  <!-- Grain SVG -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.04"/>
  </svg>

  <!-- Botanical SVG decoration -->
  <svg style="position:absolute;top:120px;left:80px;opacity:0.12;z-index:3;" width="120" height="200" viewBox="0 0 120 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 190 C60 150 40 120 20 80" stroke="#1a1714" stroke-width="0.8" fill="none"/>
    <path d="M60 160 C60 120 80 100 100 70" stroke="#1a1714" stroke-width="0.8" fill="none"/>
    <path d="M60 130 C50 110 30 100 10 90" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <path d="M60 110 C70 90 90 80 110 60" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <path d="M60 80 C55 60 45 50 30 30" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="20" cy="78" r="2" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="100" cy="68" r="2" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="10" cy="88" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <svg style="position:absolute;bottom:120px;right:160px;opacity:0.1;z-index:3;transform:rotate(180deg);" width="80" height="140" viewBox="0 0 80 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M40 130 C40 100 25 80 10 50" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M40 100 C40 70 55 60 70 35" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M40 70 C32 55 20 45 5 30" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="10" cy="48" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="70" cy="33" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <!-- Logo -->
  <div class="logo">Культура</div>

  <!-- Slide number -->
  <div class="slide-num">01 / 06</div>

  <!-- Main content -->
  <div class="content">
    <div class="deco-line"></div>
    <h1 class="headline">Сколько<br>сеансов<br>нужно<br>до результата</h1>
    <p class="subheadline">Честный разбор по зонам —<br>без обещаний, только факты</p>
    <div class="deco-bottom">
      <span></span>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6" cy="6" r="5" stroke="#1a1714" stroke-width="0.8"/>
        <circle cx="6" cy="6" r="1.5" fill="#1a1714"/>
      </svg>
      <span></span>
    </div>
  </div>

</div>
</body>
</html>
