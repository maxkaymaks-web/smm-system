<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #1a1714; }

  .slide {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('../../../assets/images/post03-slide-01.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.5) saturate(0.85);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(26,23,20,0.92) 0%,
      rgba(26,23,20,0.55) 45%,
      rgba(26,23,20,0.15) 100%
    );
    z-index: 2;
  }

  .grain {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* Brand top-right */
  .brand {
    position: absolute;
    top: 52px;
    right: 60px;
    z-index: 10;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: rgba(245,240,234,0.5);
    letter-spacing: 0.1em;
  }

  /* Slide number bottom-right */
  .slide-num {
    position: absolute;
    bottom: 56px;
    right: 60px;
    z-index: 10;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: rgba(245,240,234,0.4);
    letter-spacing: 0.15em;
  }

  /* Main content pinned to bottom */
  .content {
    position: absolute;
    bottom: 120px;
    left: 72px;
    right: 100px;
    z-index: 10;
  }

  .overline {
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8a6e52;
    margin-bottom: 32px;
  }

  .accent-line {
    width: 56px;
    height: 1.5px;
    background: #8a6e52;
    margin-bottom: 36px;
    opacity: 0.8;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 112px;
    line-height: 0.9;
    color: #F5F0EA;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 48px;
  }

  .subheadline {
    font-family: 'Raleway', sans-serif;
    font-size: 26px;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(245,240,234,0.68);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="bg"></div>

  <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="100%" height="100%" filter="url(#n)" opacity="0.05"/>
  </svg>

  <div class="overlay"></div>

  <div class="brand">Культура</div>
  <div class="slide-num">01 / 06</div>

  <div class="content">
    <div class="overline">Лазерная эпиляция</div>
    <div class="accent-line"></div>
    <div class="headline">СКОЛЬКО<br>СЕАНСОВ<br>НУЖНО ДО<br>РЕЗУЛЬТАТА</div>
    <div class="subheadline">Честный разбор по зонам —<br>без обещаний, только факты</div>
  </div>

</div>
</body>
</html>
