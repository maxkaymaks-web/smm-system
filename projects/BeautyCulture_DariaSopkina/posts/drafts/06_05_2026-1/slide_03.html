<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}

.slide {
  position: relative;
  width: 1080px;
  height: 1350px;
  background-color: #F5F0EA;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px;
}

.grain {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}

.logo {
  position: absolute;
  top: 80px;
  right: 80px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  letter-spacing: 0.25em;
  color: #1a1714;
  opacity: 0.5;
  z-index: 20;
}

.slide-num {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  color: #1a1714;
  opacity: 0.5;
  letter-spacing: 0.15em;
  z-index: 20;
}

.content {
  max-width: 860px;
  z-index: 5;
}

.zone-label {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #8a6e52;
  opacity: 0.9;
  margin-bottom: 28px;
}

.headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.0;
  letter-spacing: 0.03em;
  color: #1a1714;
  text-transform: uppercase;
  margin-bottom: 36px;
}

.divider {
  width: 100%;
  height: 1px;
  background: #1a1714;
  opacity: 0.15;
  margin-bottom: 44px;
}

.body-text {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 20px;
  line-height: 1.75;
  color: #1a1714;
  opacity: 0.85;
}

.sessions-block {
  margin-top: 52px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.sessions-number {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 72px;
  line-height: 1;
  color: #8a6e52;
  letter-spacing: -0.02em;
}

.sessions-label {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 16px;
  color: #1a1714;
  opacity: 0.6;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.sessions-detail {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: 15px;
  color: #1a1714;
  opacity: 0.5;
  margin-top: 8px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="slide">

  <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.04"/>
  </svg>

  <!-- Botanical -->
  <svg style="position:absolute;top:100px;right:80px;opacity:0.1;z-index:3;" width="100" height="180" viewBox="0 0 100 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 170 C50 130 30 105 10 65" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M50 140 C50 105 70 85 90 50" stroke="#1a1714" stroke-width="0.7" fill="none"/>
    <path d="M50 110 C40 90 22 78 5 60" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <path d="M50 80 C60 62 78 52 95 32" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="10" cy="63" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="90" cy="48" r="1.5" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <svg style="position:absolute;bottom:80px;left:80px;opacity:0.07;z-index:3;" width="70" height="120" viewBox="0 0 70 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M35 110 C35 80 18 60 5 35" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <path d="M35 80 C35 52 52 38 65 15" stroke="#1a1714" stroke-width="0.6" fill="none"/>
    <circle cx="5" cy="33" r="1.2" stroke="#1a1714" stroke-width="0.5" fill="none"/>
    <circle cx="65" cy="13" r="1.2" stroke="#1a1714" stroke-width="0.5" fill="none"/>
  </svg>

  <div class="logo">Культура</div>
  <div class="slide-num">03 / 06</div>

  <div class="content">
    <div class="zone-label">Зона 02</div>
    <h1 class="headline">Под-<br>мышки</h1>
    <div class="divider"></div>
    <p class="body-text">
      Одна из самых отзывчивых зон — волоски здесь тёмные и крупные, лазер захватывает их хорошо.<br><br>
      Большинство клиентов замечают значительное разрежение уже после <strong style="color:#8a6e52;font-weight:500;">3–4 сеансов</strong>.<br><br>
      Полный курс — обычно с интервалом 4–5 недель ✨
    </p>
    <div class="sessions-block">
      <div>
        <div style="display:flex;align-items:baseline;gap:12px;">
          <span class="sessions-number">6–7</span>
          <span class="sessions-label">сеансов</span>
        </div>
        <div class="sessions-detail">интервал 4–5 недель</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
