<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
body { font-family: 'Raleway', sans-serif; background: #FAF8F5; }
</style></head><body>
<div style="width:1080px;height:1350px;position:relative;overflow:hidden;background:#FAF8F5;">

  <!-- Grain texture -->
  <svg style="position:absolute;inset:0;width:1080px;height:1350px;pointer-events:none;z-index:1" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="1080" height="1350" filter="url(#grain)" opacity="0.06"/>
  </svg>

  <!-- Ghost letter S — z-index:3 so it shows above body and gradients -->
  <div style="position:absolute;right:-40px;top:10px;font-family:'Cormorant Garamond',serif;font-size:700px;font-weight:300;color:rgba(0,0,0,0.05);line-height:1;user-select:none;pointer-events:none;z-index:3">S</div>

  <!-- Body image — page level, sits in spacer zone between texts -->
  <img src="./photo-02-body-v3-nobg.png"
       style="position:absolute;top:430px;left:-30px;width:calc(100% + 60px);height:490px;object-fit:cover;object-position:center 36%;z-index:1;pointer-events:none">

  <!-- Bottom fade — blends body into price section -->
  <div style="position:absolute;bottom:100px;left:0;right:0;height:200px;background:linear-gradient(to top,#FAF8F5 50%,transparent 100%);z-index:2;pointer-events:none"></div>

  <!-- Botanical left — above body image -->
  <svg width="80" height="560" viewBox="0 0 50 350" style="position:absolute;left:22px;top:300px;opacity:0.09;pointer-events:none;z-index:3" xmlns="http://www.w3.org/2000/svg">
    <path d="M25 340 C23 300 27 260 25 220 C23 180 26 140 25 100 C24 70 25 40 25 10" stroke="#3a3028" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M25 280 C10 265 2 250 5 238 C8 228 18 242 25 255" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 280 C40 265 48 250 45 238 C42 228 32 242 25 255" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 210 C8 196 -2 180 2 167 C6 155 16 170 25 183" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 210 C42 196 52 180 48 167 C44 155 34 170 25 183" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 145 C12 132 4 118 8 108 C12 99 20 113 25 126" stroke="#3a3028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M25 145 C38 132 46 118 42 108 C38 99 30 113 25 126" stroke="#3a3028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  </svg>

  <!-- Slide number -->
  <div style="position:absolute;top:52px;right:60px;font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(0,0,0,0.18);letter-spacing:2px;z-index:4">02</div>

  <!-- Content — z-index:4, transparent, above everything -->
  <div style="position:absolute;top:56px;left:72px;right:72px;bottom:106px;display:flex;flex-direction:column;z-index:4">

    <!-- Heading -->
    <div style="font-family:'Raleway',sans-serif;font-size:20px;font-weight:500;letter-spacing:6px;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:4px">Комплекс</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:260px;font-weight:600;line-height:0.82;letter-spacing:2px;color:#1a1a1a">S</div>

    <!-- Divider -->
    <div style="width:64px;height:1.5px;background:rgba(0,0,0,0.18);margin:18px 0 16px"></div>

    <!-- Zones -->
    <ul style="list-style:none">
      <li style="display:flex;align-items:center;gap:22px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.07);">
        <span style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:rgba(0,0,0,0.15);min-width:38px">01</span>
        <div style="font-family:'Raleway',sans-serif;font-size:32px;font-weight:600;color:#1a1a1a">Тотальное бикини</div>
      </li>
      <li style="display:flex;align-items:center;gap:22px;padding:10px 0;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:rgba(0,0,0,0.15);min-width:38px">02</span>
        <div style="font-family:'Raleway',sans-serif;font-size:32px;font-weight:600;color:#1a1a1a">Подмышки</div>
      </li>
    </ul>

    <!-- Spacer — body image sits here visually -->
    <div style="flex:1"></div>

    <!-- Tagline italic — above pills -->
    <div style="text-align:center;margin-bottom:16px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:44px;font-weight:300;color:rgba(0,0,0,0.36)">идеальный первый шаг</div>

    <!-- Pills — full width, 2 pills -->
    <div style="display:flex;gap:12px;margin-bottom:20px">
      <div style="flex:1;background:#1a1a1a;border-radius:40px;padding:14px 0;text-align:center;font-family:'Raleway',sans-serif;font-size:15px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#FAF8F5">Безболезненно</div>
      <div style="flex:1;background:#1a1a1a;border-radius:40px;padding:14px 0;text-align:center;font-family:'Raleway',sans-serif;font-size:15px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#FAF8F5">Без реабилитации</div>
    </div>

    <!-- Price — bigger -->
    <div style="text-align:center">
      <div style="display:flex;align-items:baseline;gap:10px;justify-content:center">
        <span style="font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:300;color:#1a1a1a;line-height:1">2 500</span>
        <span style="font-family:'Raleway',sans-serif;font-size:44px;font-weight:300;color:rgba(0,0,0,0.35)">₽</span>
      </div>
      <div style="font-family:'Raleway',sans-serif;font-size:22px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:rgba(0,0,0,0.32);margin-top:4px">30 минут · диодный лазер</div>
    </div>

  </div>

  <!-- Footer -->
  <div style="position:absolute;bottom:40px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(0,0,0,0.18);display:flex;flex-direction:column;align-items:center;gap:4px;z-index:4">
    КУЛЬТУРА
    <span style="font-family:'Raleway',sans-serif;font-size:13px;letter-spacing:6px;color:rgba(0,0,0,0.13)">СТУДИЯ КРАСОТЫ</span>
  </div>

</div>
</body></html>
