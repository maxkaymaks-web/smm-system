<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
body { font-family: 'Raleway', sans-serif; background: #FAF8F5; }
</style></head><body>
<div style="width:1080px;height:1350px;position:relative;overflow:hidden;background:#FAF8F5;">

  <!-- Grain texture -->
  <svg style="position:absolute;inset:0;width:1080px;height:1350px;pointer-events:none;z-index:1" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="1080" height="1350" filter="url(#grain)" opacity="0.06"/>
  </svg>

  <!-- Botanical left -->
  <svg width="100" height="700" viewBox="0 0 50 350" style="position:absolute;left:30px;top:350px;opacity:0.10;pointer-events:none;z-index:1" xmlns="http://www.w3.org/2000/svg">
    <path d="M25 340 C23 300 27 260 25 220 C23 180 26 140 25 100 C24 70 25 40 25 10" stroke="#3a3028" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M25 280 C10 265 2 250 5 238 C8 228 18 242 25 255" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 280 C40 265 48 250 45 238 C42 228 32 242 25 255" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 210 C8 196 -2 180 2 167 C6 155 16 170 25 183" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 210 C42 196 52 180 48 167 C44 155 34 170 25 183" stroke="#3a3028" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M25 145 C12 132 4 118 8 108 C12 99 20 113 25 126" stroke="#3a3028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M25 145 C38 132 46 118 42 108 C38 99 30 113 25 126" stroke="#3a3028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M25 55 C18 44 14 32 18 26 C22 20 25 36 25 48" stroke="#3a3028" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <path d="M25 55 C32 44 36 32 32 26 C28 20 25 36 25 48" stroke="#3a3028" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </svg>

  <!-- Ghost letter -->
  <div style="position:absolute;right:-10px;top:20px;font-family:'Cormorant Garamond',serif;font-size:440px;font-weight:300;color:rgba(0,0,0,0.04);line-height:1;user-select:none;pointer-events:none;z-index:0">L</div>

  <!-- Slide number -->
  <div style="position:absolute;top:52px;right:60px;font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(0,0,0,0.18);letter-spacing:2px;z-index:2">04</div>

  <!-- Content -->
  <div style="position:absolute;inset:0;padding:64px 72px 130px;display:flex;flex-direction:column;z-index:2">

    <!-- Heading -->
    <div style="font-family:'Raleway',sans-serif;font-size:20px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-bottom:12px">Комплекс</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:130px;font-weight:600;line-height:0.88;letter-spacing:2px;color:#1a1a1a;margin-bottom:0">L</div>

    <!-- Divider -->
    <div style="width:64px;height:1.5px;background:rgba(0,0,0,0.18);margin:26px 0 30px"></div>

    <!-- Zones -->
    <ul style="list-style:none;">
      <li style="display:flex;align-items:flex-start;gap:24px;padding:20px 0;border-bottom:1px solid rgba(0,0,0,0.07);">
        <span style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:rgba(0,0,0,0.18);line-height:1;min-width:42px;padding-top:2px">01</span>
        <div>
          <div style="font-family:'Raleway',sans-serif;font-size:28px;font-weight:600;color:#1a1a1a;line-height:1.2">Тотальное бикини</div>
        </div>
      </li>
      <li style="display:flex;align-items:flex-start;gap:24px;padding:20px 0;border-bottom:1px solid rgba(0,0,0,0.07);">
        <span style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:rgba(0,0,0,0.18);line-height:1;min-width:42px;padding-top:2px">02</span>
        <div>
          <div style="font-family:'Raleway',sans-serif;font-size:28px;font-weight:600;color:#1a1a1a;line-height:1.2">Подмышки</div>
        </div>
      </li>
      <li style="display:flex;align-items:flex-start;gap:24px;padding:20px 0;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:rgba(0,0,0,0.18);line-height:1;min-width:42px;padding-top:2px">03</span>
        <div>
          <div style="font-family:'Raleway',sans-serif;font-size:28px;font-weight:600;color:#1a1a1a;line-height:1.2">Ноги полностью</div>
          <div style="font-size:24px;font-weight:300;color:rgba(0,0,0,0.4);margin-top:4px;line-height:1.4">бёдра + голени</div>
        </div>
      </li>
    </ul>

    <!-- Price — centered, dominant -->
    <div style="margin-top:auto;text-align:center;padding-bottom:10px;">
      <div style="width:64px;height:1px;background:rgba(0,0,0,0.10);margin:0 auto 28px"></div>
      <div style="display:flex;align-items:baseline;gap:10px;justify-content:center">
        <span style="font-family:'Cormorant Garamond',serif;font-size:148px;font-weight:300;color:#1a1a1a;line-height:1">3 700</span>
        <span style="font-family:'Raleway',sans-serif;font-size:44px;font-weight:300;color:rgba(0,0,0,0.35)">₽</span>
      </div>
      <div style="font-family:'Raleway',sans-serif;font-size:20px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:rgba(0,0,0,0.28);margin-top:8px">1 час · диодный лазер</div>
    </div>

  </div>

  <!-- Footer -->
  <div style="position:absolute;bottom:56px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(0,0,0,0.18);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2">
    КУЛЬТУРА
    <span style="font-family:'Raleway',sans-serif;font-size:15px;letter-spacing:6px;color:rgba(0,0,0,0.13)">СТУДИЯ КРАСОТЫ</span>
  </div>

</div>
</body></html>
