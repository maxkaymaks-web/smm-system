<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
body { font-family: 'Raleway', sans-serif; background: #FAF8F5; }
</style></head><body>
<div style="width:1080px;height:1350px;position:relative;overflow:hidden;background:#FAF8F5;">

  <!-- Background photo — full bleed, model on left -->
  <div style="position:absolute;inset:0;background-image:url('./photo-04-body-raw.jpg');background-size:cover;background-position:left center;z-index:0"></div>

  <!-- Right fade — ensures text legibility on light bg -->
  <div style="position:absolute;top:0;right:0;bottom:0;width:620px;background:linear-gradient(to left,rgba(250,248,245,0.92) 0%,rgba(250,248,245,0.70) 55%,transparent 100%);z-index:1;pointer-events:none"></div>

  <!-- Bottom overlay — price area -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:380px;background:linear-gradient(to top,rgba(250,248,245,0.96) 0%,rgba(250,248,245,0.60) 60%,transparent 100%);z-index:1;pointer-events:none"></div>

  <!-- Grain texture -->
  <svg style="position:absolute;inset:0;width:1080px;height:1350px;pointer-events:none;z-index:2" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <rect width="1080" height="1350" filter="url(#grain)" opacity="0.05"/>
  </svg>

  <!-- Ghost letter L — right side -->
  <div style="position:absolute;right:-50px;bottom:-60px;font-family:'Cormorant Garamond',serif;font-size:700px;font-weight:300;color:rgba(0,0,0,0.04);line-height:1;user-select:none;pointer-events:none;z-index:3">L</div>

  <!-- Slide number -->
  <div style="position:absolute;top:52px;right:60px;font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(0,0,0,0.22);letter-spacing:2px;z-index:4">04</div>

  <!-- Content — RIGHT side -->
  <div style="position:absolute;top:56px;left:460px;right:48px;bottom:106px;display:flex;flex-direction:column;z-index:4">

    <!-- Heading -->
    <div style="font-family:'Raleway',sans-serif;font-size:20px;font-weight:500;letter-spacing:6px;text-transform:uppercase;color:rgba(0,0,0,0.30);margin-bottom:4px">Комплекс</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:220px;font-weight:600;line-height:0.82;letter-spacing:2px;color:#1a1a1a">L</div>

    <!-- Divider -->
    <div style="width:56px;height:1.5px;background:rgba(0,0,0,0.20);margin:16px 0 14px"></div>

    <!-- Zones -->
    <ul style="list-style:none">
      <li style="display:flex;align-items:center;gap:16px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.09);">
        <span style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(0,0,0,0.18);min-width:32px">01</span>
        <div style="font-family:'Raleway',sans-serif;font-size:26px;font-weight:600;color:#1a1a1a">Тотальное бикини</div>
      </li>
      <li style="display:flex;align-items:center;gap:16px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.09);">
        <span style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(0,0,0,0.18);min-width:32px">02</span>
        <div style="font-family:'Raleway',sans-serif;font-size:26px;font-weight:600;color:#1a1a1a">Подмышки</div>
      </li>
      <li style="display:flex;align-items:center;gap:16px;padding:9px 0;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:rgba(0,0,0,0.18);min-width:32px">03</span>
        <div>
          <div style="font-family:'Raleway',sans-serif;font-size:26px;font-weight:600;color:#1a1a1a">Ноги полностью</div>
          <div style="font-family:'Raleway',sans-serif;font-size:18px;font-weight:300;color:rgba(0,0,0,0.38)">бёдра + голени</div>
        </div>
      </li>
    </ul>

    <!-- Spacer -->
    <div style="flex:1"></div>

    <!-- Price -->
    <div style="text-align:left;margin-bottom:8px">
      <div style="display:flex;align-items:baseline;gap:10px">
        <span style="font-family:'Cormorant Garamond',serif;font-size:160px;font-weight:300;color:#1a1a1a;line-height:1">4 500</span>
        <span style="font-family:'Raleway',sans-serif;font-size:52px;font-weight:300;color:rgba(0,0,0,0.38)">₽</span>
      </div>
      <div style="font-family:'Raleway',sans-serif;font-size:26px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:rgba(0,0,0,0.32);margin-top:6px">1 час · диодный лазер</div>
    </div>

  </div>

  <!-- Footer -->
  <div style="position:absolute;bottom:40px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(0,0,0,0.20);display:flex;flex-direction:column;align-items:center;gap:4px;z-index:4">
    КУЛЬТУРА
    <span style="font-family:'Raleway',sans-serif;font-size:13px;letter-spacing:6px;color:rgba(0,0,0,0.14)">СТУДИЯ КРАСОТЫ</span>
  </div>

</div>
</body></html>
