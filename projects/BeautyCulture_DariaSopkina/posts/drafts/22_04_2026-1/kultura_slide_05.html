<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
body { font-family: 'Raleway', sans-serif; }
.slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }

body { background:#1a1714; }
</style></head><body>
<div class="slide" style="background:#1a1714;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:80px;">

  <div style="font-family:'Raleway',sans-serif;font-size:20px;font-weight:500;
    letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.3);
    margin-bottom:36px">Лазерная эпиляция</div>

  <div style="font-family:'Cormorant Garamond',serif;font-size:110px;font-weight:600;
    line-height:0.92;letter-spacing:2px;text-transform:uppercase;color:#fff;
    margin-bottom:18px">Записаться</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:300;
    font-style:italic;color:rgba(255,255,255,0.65);margin-bottom:0">сейчас</div>

  <div style="width:60px;height:1px;background:rgba(255,255,255,0.2);margin:40px auto 36px"></div>

  <div style="font-family:'Raleway',sans-serif;font-size:26px;font-weight:300;
    line-height:1.7;color:rgba(255,255,255,0.5);margin-bottom:10px">
    Рубинштейна 6 · Санкт-Петербург
  </div>
  <div style="font-family:'Raleway',sans-serif;font-size:22px;font-weight:300;
    color:rgba(255,255,255,0.35);margin-bottom:48px">
    Диодный лазер · без боли
  </div>

  <!-- Пиллюли -->
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:14px">
    <div style="display:inline-flex;align-items:center;gap:10px;
      border:1px solid rgba(255,255,255,0.15);border-radius:40px;
      padding:12px 24px;font-family:'Raleway',sans-serif;font-size:20px;
      color:rgba(255,255,255,0.38)">
      ✦ результат с 1 сеанса
    </div>
    <div style="display:inline-flex;align-items:center;gap:10px;
      border:1px solid rgba(255,255,255,0.15);border-radius:40px;
      padding:12px 24px;font-family:'Raleway',sans-serif;font-size:20px;
      color:rgba(255,255,255,0.38)">
      ✦ без боли
    </div>
    <div style="display:inline-flex;align-items:center;gap:10px;
      border:1px solid rgba(255,255,255,0.15);border-radius:40px;
      padding:12px 24px;font-family:'Raleway',sans-serif;font-size:20px;
      color:rgba(255,255,255,0.38)">
      ✦ диодный лазер
    </div>
  </div>

  
<div style="position:absolute;bottom:52px;left:0;right:0;text-align:center;
  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;
  letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.22);
  display:flex;flex-direction:column;align-items:center;gap:5px">
  КУЛЬТУРА
  <span style="font-family:'Raleway',sans-serif;font-size:14px;letter-spacing:6px;
    color:rgba(255,255,255,0.16)">СТУДИЯ КРАСОТЫ</span>
</div>

</div>
</body></html>
